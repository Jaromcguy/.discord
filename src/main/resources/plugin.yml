name: .discord
version: '${project.version}'
main: de.example.myplugin.MyPlugin
api-version: '1.21'
description: Clickable Discord Link Plugin
author: DeinName

commands:
  discord:
    description: Öffnet das Discord-Menü
    usage: /<command>
    permission: myplugin.discord
    permission-message: "&cDu hast keine Berechtigung!"

permissions:
  myplugin.discord:
    description: Erlaubt die Nutzung von /discord
    default: true
